<!-- @dsCard group="Type" viewport="700x210" name="Body — Inter sans" subtitle="UI & body copy in Inter, three sizes" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { margin: 0; background: var(--tnx-bg); font-family: var(--tnx-sans); padding: 26px 24px; color: var(--tnx-text); }
      p { margin: 0 0 12px; }
      .lg { font-size: 19px; line-height: 1.6; color: var(--tnx-text-soft); }
      .md { font-size: 17px; line-height: 1.7; color: var(--tnx-muted); }
      .sm { font-size: 13px; line-height: 1.6; color: var(--tnx-muted); }
      .tag { color: var(--tnx-faint); font-size: 11px; margin-top: 4px; }
    </style>
  </head>
  <body>
    <p class="lg">Mapas, ordens de serviço, monitoramento e solo em um só app. <span class="tag">Inter 400 · 19px · lead 1.6</span></p>
    <p class="md">Controle a operação e decida com dados em tempo real. <span class="tag">Inter 400 · 17px · lead 1.7</span></p>
    <p class="sm">Interface pensada para desktop e mobile, com continuidade entre escritório e campo. <span class="tag">Inter 400 · 13px</span></p>
  </body>
</html>
