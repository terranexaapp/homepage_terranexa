<!-- @dsCard group="Colors" viewport="700x150" name="Brand greens" subtitle="Leaf-green primary across four depths" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--tnx-bg);
        font-family: var(--tnx-sans);
        padding: 22px;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
      }
      .sw {
        border-radius: var(--tnx-radius-md);
        border: 1px solid var(--tnx-line);
        height: 78px;
        display: flex;
        align-items: flex-end;
        padding: 10px;
      }
      .meta {
        margin-top: 9px;
        color: var(--tnx-text);
      }
      .meta b {
        display: block;
        font-size: 12px;
        font-weight: 700;
      }
      .meta span {
        display: block;
        font-size: 11px;
        color: var(--tnx-muted);
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div>
        <div class="sw" style="background: var(--tnx-green)"></div>
        <div class="meta"><b>Primary</b><span>#74CA45</span></div>
      </div>
      <div>
        <div class="sw" style="background: var(--tnx-green-strong)"></div>
        <div class="meta"><b>Strong</b><span>#3D8A22</span></div>
      </div>
      <div>
        <div class="sw" style="background: var(--tnx-green-dark)"></div>
        <div class="meta"><b>Dark</b><span>#1F5F26</span></div>
      </div>
      <div>
        <div class="sw" style="background: var(--tnx-green-light)"></div>
        <div class="meta"><b>Light wash</b><span>#E8F4DC</span></div>
      </div>
    </div>
  </body>
</html>
