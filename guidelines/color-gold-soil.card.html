<!-- @dsCard group="Colors" viewport="700x150" name="Harvest gold & soil" subtitle="Secondary accent + earthy support tone" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { margin: 0; background: var(--tnx-bg); font-family: var(--tnx-sans); padding: 22px; }
      .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
      .sw { border-radius: var(--tnx-radius-md); border: 1px solid var(--tnx-line); height: 78px; }
      .meta { margin-top: 9px; color: var(--tnx-text); }
      .meta b { display: block; font-size: 12px; font-weight: 700; }
      .meta span { display: block; font-size: 11px; color: var(--tnx-muted); font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="row">
      <div><div class="sw" style="background: var(--tnx-gold-light)"></div><div class="meta"><b>Gold light</b><span>#F1CB76</span></div></div>
      <div><div class="sw" style="background: var(--tnx-gold)"></div><div class="meta"><b>Gold</b><span>#E8A84C</span></div></div>
      <div><div class="sw" style="background: var(--tnx-gold-deep)"></div><div class="meta"><b>Gold deep</b><span>#D99128</span></div></div>
      <div><div class="sw" style="background: var(--tnx-soil)"></div><div class="meta"><b>Soil</b><span>#A0714F</span></div></div>
      <div><div class="sw" style="background: var(--tnx-soil-dark)"></div><div class="meta"><b>Soil dark</b><span>#7A5238</span></div></div>
    </div>
  </body>
</html>
