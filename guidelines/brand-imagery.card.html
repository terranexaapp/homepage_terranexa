<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { margin: 0; background: var(--tnx-bg); font-family: var(--tnx-sans); padding: 18px; }
      .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 12px; }
      .ph { position: relative; border-radius: var(--tnx-radius-lg); overflow: hidden; border: 1px solid var(--tnx-line); aspect-ratio: 16/10; }
      .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .ph.tall { aspect-ratio: 3/4; }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="ph"><img src="../assets/hero-fazendeiro.png" alt="Farmer in field at sunrise" /></div>
      <div class="ph"><img src="../assets/tecnologia-campo.png" alt="Field technology" /></div>
      <div class="ph"><img src="../assets/algodao-cta.png" alt="Cotton field" /></div>
    </div>
  </body>
</html>
