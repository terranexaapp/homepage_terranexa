<!-- @dsCard group="Colors" viewport="700x160" name="Dark surfaces" subtitle="Forest-dark backgrounds & raised surfaces (marketing)" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { margin: 0; background: #000; font-family: var(--tnx-sans); padding: 22px; }
      .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .sw { border-radius: var(--tnx-radius-md); border: 1px solid var(--tnx-line); height: 78px; }
      .meta { margin-top: 9px; color: var(--tnx-text); }
      .meta b { display: block; font-size: 12px; font-weight: 700; }
      .meta span { display: block; font-size: 11px; color: var(--tnx-muted); font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="row">
      <div><div class="sw" style="background: var(--tnx-bg)"></div><div class="meta"><b>Page bg</b><span>#07130B</span></div></div>
      <div><div class="sw" style="background: var(--tnx-bg-alt)"></div><div class="meta"><b>Section alt</b><span>#0A1810</span></div></div>
      <div><div class="sw" style="background: var(--tnx-surface)"></div><div class="meta"><b>Surface</b><span>#0E2116</span></div></div>
      <div><div class="sw" style="background: var(--tnx-surface-soft)"></div><div class="meta"><b>Surface soft</b><span>#132A1B</span></div></div>
    </div>
  </body>
</html>
