<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { margin: 0; background: var(--tnx-bg); font-family: var(--tnx-sans); padding: 28px 30px; display: flex; align-items: center; gap: 40px; }
      .icon { width: 96px; height: 96px; flex: 0 0 auto; }
      .stack { display: grid; gap: 18px; }
      .stack img { height: 46px; object-fit: contain; object-position: left center; }
      .note { color: var(--tnx-muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <img class="icon" src="../assets/terranexa-icon.svg" alt="TerraNexa icon" />
    <div class="stack">
      <img src="../assets/terranexa-logo-wordmark.svg" alt="TerraNexa wordmark" />
      <p class="note">Icon: forest-green disc, leaf-green seedling formed as a “T”, three gold seeds. Wordmark: Georgia 800 — “Terra” green, “Nexa” gold.</p>
    </div>
  </body>
</html>
