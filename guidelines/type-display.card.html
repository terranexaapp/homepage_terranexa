<!-- @dsCard group="Type" viewport="700x200" name="Display — Georgia serif" subtitle="Headlines in tight-tracked serif; em = green emphasis" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { margin: 0; background: var(--tnx-bg); font-family: var(--tnx-sans); padding: 26px 24px; }
      .display {
        font-family: var(--tnx-serif);
        color: var(--tnx-text);
        font-size: 58px;
        line-height: var(--tnx-leading-display);
        letter-spacing: var(--tnx-track-display);
        margin: 0;
      }
      .display em { color: var(--tnx-green); font-style: normal; }
      .sub {
        font-family: var(--tnx-serif);
        color: var(--tnx-text);
        font-size: 30px;
        letter-spacing: var(--tnx-track-heading);
        margin: 14px 0 0;
      }
      .note { margin: 16px 0 0; color: var(--tnx-muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <h1 class="display">Gestão agrícola <em>inteligente</em></h1>
    <p class="sub">Do campo ao controle.</p>
    <p class="note">Georgia · 800 · tracking −0.045em (hero) / −0.035em (h2)</p>
  </body>
</html>
